name: Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: minisaas_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath
        coverage: none

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM dependencies & Build
      run: |
        npm install
        npm run build

    - name: Run Migrations
      env:
        DB_CONNECTION: mysql
        DB_DATABASE: minisaas_test
        DB_HOST: 127.0.0.1
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan migrate -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Execute tests via PHPUnit/Pest
      env:
        DB_CONNECTION: mysql
        DB_DATABASE: minisaas_test
        DB_HOST: 127.0.0.1
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan test
